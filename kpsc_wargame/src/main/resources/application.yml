server:
  port: 8000
  address: 0.0.0.0
#  servlet:
#    encoding:
#      force-response: true
#      charset: UTF-8
spring:

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:kpsc_db}
    username: ${DB_USER:kpsc_user}
    password: ${DB_PASSWORD:super_secure_pw}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        format-sql: true

  application:
    name: KPSC-DLPC

  devtools:
    restart:
      enabled: true

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin_pw}

jwt:
  jwtkey: ${JWT_KEY:super_secret_jwt_key}

domain:
  domain: ${DOMAIN_NAME:example.com}