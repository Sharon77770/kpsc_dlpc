<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>등록 완료 - KPSC DLPC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50 text-slate-800">

  <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="/" class="flex-shrink-0 flex items-center gap-2">
            <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
            <span class="font-bold text-xl tracking-tight text-slate-900">KPSC DLPC</span>
          </a>
        </div>
        
        <div class="hidden sm:flex sm:space-x-8 items-center">
          <a href="/" class="text-slate-500 hover:text-slate-900 hover:border-slate-300 px-1 pt-1 border-b-2 border-transparent text-sm font-medium transition-colors duration-200">메인 페이지</a>
          <a href="/register" class="text-indigo-600 border-b-2 border-indigo-600 px-1 pt-1 text-sm font-medium">등록하기</a>
          <a href="/vm" class="bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-4 py-2 rounded-md text-sm font-bold transition-colors duration-200">VM 접속하기</a>
        </div>

        <div class="-mr-2 flex items-center sm:hidden">
          <button type="button" id="mobile-menu-btn" class="inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-slate-500 hover:bg-slate-100 focus:outline-none">
            <span class="sr-only">메뉴 열기</span>
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="sm:hidden hidden" id="mobile-menu">
      <div class="pt-2 pb-3 space-y-1 bg-white border-b border-slate-200 shadow-lg">
        <a href="/" class="border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-900 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">메인 페이지</a>
        <a href="/register" class="bg-indigo-50 border-indigo-500 text-indigo-700 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">등록하기</a>
        <a href="/vm" class="border-transparent text-indigo-600 hover:bg-slate-50 block pl-3 pr-4 py-2 border-l-4 text-base font-bold">VM 접속하기</a>
      </div>
    </div>
  </nav>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="max-w-lg w-full bg-white rounded-2xl shadow-xl border border-slate-100 p-8 text-center">
      
      <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
        <svg class="h-8 w-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      
      <h2 class="text-2xl font-extrabold text-slate-900 mb-2">요청이 완료되었습니다</h2>
      <p class="text-slate-500 mb-8">사용자 등록이 성공적으로 완료되었습니다.<br/>아래 발급된 API 키를 사용하여 VM에 접속해 주세요.</p>

      <div class="bg-slate-50 rounded-xl border border-slate-200 p-5 text-left mb-6 shadow-inner">
        <div class="flex items-center justify-between mb-3">
          <span class="text-sm font-bold text-slate-700 flex items-center gap-2">
            <svg class="w-4 h-4 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            발급된 API 키
          </span>
          <span id="copyAlert" class="text-xs font-bold text-green-600 hidden flex items-center transition-all">
            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            복사 완료!
          </span>
        </div>
        
        <div class="font-mono text-sm text-slate-800 break-all bg-white p-3 rounded border border-slate-200 select-all" id="apiKey" th:text="${apiKey}">API_KEY_PLACEHOLDER</div>
        
        <button onclick="copyApiKey()" class="mt-4 w-full flex justify-center items-center py-2.5 px-4 border border-slate-300 rounded-lg shadow-sm text-sm font-medium text-slate-700 bg-white hover:bg-slate-100 hover:text-indigo-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
          API 키 복사하기
        </button>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 mt-6 border-t border-slate-100 pt-6">
        <a href="/vm" class="flex-1 inline-flex justify-center items-center px-4 py-3 border border-transparent text-sm font-bold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm transition-colors">
          VM 바로 접속하기
        </a>
        <a href="/" class="flex-1 inline-flex justify-center items-center px-4 py-3 border border-slate-300 text-sm font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 shadow-sm transition-colors">
          메인 페이지
        </a>
      </div>
      
    </div>
  </main>

  <footer class="bg-slate-900 mt-auto">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm text-slate-400">
        &copy; 2026 KPSC DLPC by <a href="https://github.com/Sharon77770" target="_blank" class="text-slate-300 hover:text-white transition-colors">GitHub Sharon77770</a>. All rights reserved.
      </p>
    </div>
  </footer>

  <script>
    // 모바일 메뉴 토글
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });

    // API 키 복사 스크립트 (기존 로직 유지 + Tailwind 클래스 연동)
    function copyApiKey() {
      const apiKey = document.getElementById("apiKey").innerText;

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(apiKey).then(() => {
          showCopyAlert();
        }).catch(err => {
          fallbackCopyText(apiKey);
        });
      } else {
        fallbackCopyText(apiKey);
      }
    }

    function fallbackCopyText(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.top = "-1000px";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();

      try {
        const successful = document.execCommand("copy");
        if (successful) showCopyAlert();
      } catch (err) {
        alert("복사 실패: " + err);
      }

      document.body.removeChild(textarea);
    }

    function showCopyAlert() {
      const alertBox = document.getElementById("copyAlert");
      // Tailwind의 hidden 클래스를 제거하여 보여줌
      alertBox.classList.remove("hidden");
      setTimeout(() => {
        alertBox.classList.add("hidden");
      }, 2000);
    }
  </script>

</body>
</html>
