<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메인 페이지 - KPSC DLPC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 커스텀 폰트 (선택 사항) */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50 text-slate-800">

  <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="/" class="flex-shrink-0 flex items-center gap-2">
            <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
            <span class="font-bold text-xl tracking-tight text-slate-900">KPSC DLPC</span>
          </a>
        </div>
        
        <div class="hidden sm:flex sm:space-x-8 items-center">
          <a href="/" class="text-indigo-600 border-b-2 border-indigo-600 px-1 pt-1 text-sm font-medium">메인 페이지</a>
          <a href="/register" class="text-slate-500 hover:text-slate-900 hover:border-slate-300 px-1 pt-1 text-sm font-medium transition-colors duration-200">등록하기</a>
          <a href="/vm" class="bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-4 py-2 rounded-md text-sm font-bold transition-colors duration-200">VM 접속하기</a>
        </div>

        <div class="-mr-2 flex items-center sm:hidden">
          <button type="button" id="mobile-menu-btn" class="inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-slate-500 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500">
            <span class="sr-only">메뉴 열기</span>
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="sm:hidden hidden" id="mobile-menu">
      <div class="pt-2 pb-3 space-y-1 bg-white border-b border-slate-200 shadow-lg">
        <a href="/" class="bg-indigo-50 border-indigo-500 text-indigo-700 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">메인 페이지</a>
        <a href="/register" class="border-transparent text-slate-500 hover:bg-slate-50 hover:border-slate-300 hover:text-slate-900 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">등록하기</a>
        <a href="/vm" class="border-transparent text-indigo-600 hover:bg-slate-50 hover:border-slate-300 block pl-3 pr-4 py-2 border-l-4 text-base font-bold">VM 접속하기</a>
      </div>
    </div>
  </nav>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
      <div class="px-6 py-16 sm:px-12 sm:py-20 text-center">
        <span class="inline-block py-1 px-3 rounded-full bg-indigo-50 text-indigo-600 text-sm font-semibold mb-4 tracking-wide">Cloud Environment</span>
        <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight mb-4">
          KPSC DLPC에 오신 것을 <br class="sm:hidden" />환영합니다!
        </h1>
        <p class="text-lg text-slate-500 mb-8 max-w-xl mx-auto">
          언제 어디서나 개인 전용 가상 머신(VM)에 접속하여<br class="hidden sm:block" />안전하고 쾌적하게 테스트 환경을 구축해 보세요.
        </p>
        
        <div class="flex justify-center gap-4 flex-col sm:flex-row">
          <a href="/vm" class="inline-flex justify-center items-center px-8 py-3.5 border border-transparent text-base font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 shadow-md hover:shadow-lg transition-all duration-200">
            <svg class="w-5 h-5 mr-2 -ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
            VM 접속하기
          </a>
          <a href="/register" class="inline-flex justify-center items-center px-8 py-3.5 border border-slate-300 text-base font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 shadow-sm transition-all duration-200">
            신규 등록
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-slate-900 mt-auto">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm text-slate-400">
        &copy; 2026 KPSC DLPC by <a href="https://github.com/Sharon77770" target="_blank" class="text-slate-300 hover:text-white transition-colors">GitHub Sharon77770</a>. All rights reserved.
      </p>
    </div>
  </footer>

  <script>
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');

    btn.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  </script>
</body>
</html>
