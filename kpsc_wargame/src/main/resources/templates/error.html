<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오류 발생 - KPSC DLPC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50 text-slate-800">

  <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="/" class="flex-shrink-0 flex items-center gap-2">
            <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
            <span class="font-bold text-xl tracking-tight text-slate-900">KPSC DLPC</span>
          </a>
        </div>
        
        <div class="hidden sm:flex sm:space-x-8 items-center">
          <a href="/" class="text-slate-500 hover:text-slate-900 hover:border-slate-300 px-1 pt-1 border-b-2 border-transparent text-sm font-medium transition-colors duration-200">메인 페이지</a>
          <a href="/register" class="text-slate-500 hover:text-slate-900 hover:border-slate-300 px-1 pt-1 border-b-2 border-transparent text-sm font-medium transition-colors duration-200">등록하기</a>
          <a href="/vm" class="bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-4 py-2 rounded-md text-sm font-bold transition-colors duration-200">VM 접속하기</a>
        </div>

        <div class="-mr-2 flex items-center sm:hidden">
          <button type="button" id="mobile-menu-btn" class="inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-slate-500 hover:bg-slate-100 focus:outline-none">
            <span class="sr-only">메뉴 열기</span>
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="sm:hidden hidden" id="mobile-menu">
      <div class="pt-2 pb-3 space-y-1 bg-white border-b border-slate-200 shadow-lg">
        <a href="/" class="border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-900 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">메인 페이지</a>
        <a href="/register" class="border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-900 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">등록하기</a>
        <a href="/vm" class="border-transparent text-indigo-600 hover:bg-slate-50 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">VM 접속하기</a>
      </div>
    </div>
  </nav>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 p-8 text-center">
      
      <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6">
        <svg class="h-8 w-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
      </div>
      
      <h2 class="text-2xl font-extrabold text-slate-900 mb-2">오류가 발생했습니다</h2>
      <p class="text-slate-500 mb-6 text-sm">요청하신 작업을 처리하는 중 문제가 발생했습니다.</p>

      <div class="bg-red-50 border border-red-100 rounded-xl p-4 mb-8 text-left">
        <div class="flex items-start">
          <svg class="w-5 h-5 text-red-500 mt-0.5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          <p class="text-sm font-semibold text-red-700 break-keep leading-relaxed" th:text="${errorMessage}">
            죄송합니다. 잠시 후 다시 시도해주세요.
          </p>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-3">
        <a href="javascript:history.back()" class="flex-1 inline-flex justify-center items-center px-4 py-2.5 border border-slate-300 text-sm font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 shadow-sm transition-colors">
          이전 페이지
        </a>
        <a href="/" class="flex-1 inline-flex justify-center items-center px-4 py-2.5 border border-transparent text-sm font-bold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm transition-colors">
          메인으로 이동
        </a>
      </div>
      
    </div>
  </main>

  <footer class="bg-slate-900 mt-auto">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm text-slate-400">
        &copy; 2026 KPSC DLPC by <a href="https://github.com/Sharon77770" target="_blank" class="text-slate-300 hover:text-white transition-colors">GitHub Sharon77770</a>. All rights reserved.
      </p>
    </div>
  </footer>

  <script>
    // 모바일 메뉴 토글
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    btn.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  </script>

</body>
</html>
