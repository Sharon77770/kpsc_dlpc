<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VM 접속하기 - KPSC DLPC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50 text-slate-800">

  <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <a href="/" class="flex-shrink-0 flex items-center gap-2">
            <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
            <span class="font-bold text-xl tracking-tight text-slate-900">KPSC DLPC</span>
          </a>
        </div>
        
        <div class="hidden sm:flex sm:space-x-8 items-center">
          <a href="/" class="text-slate-500 hover:text-slate-900 hover:border-slate-300 px-1 pt-1 border-b-2 border-transparent text-sm font-medium transition-colors duration-200">메인 페이지</a>
          <a href="/register" class="text-slate-500 hover:text-slate-900 hover:border-slate-300 px-1 pt-1 border-b-2 border-transparent text-sm font-medium transition-colors duration-200">등록하기</a>
          <a href="/vm" class="bg-indigo-600 text-white px-4 py-2 rounded-md text-sm font-bold shadow-sm transition-colors duration-200">VM 접속하기</a>
        </div>

        <div class="-mr-2 flex items-center sm:hidden">
          <button type="button" id="mobile-menu-btn" class="inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-slate-500 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500">
            <span class="sr-only">메뉴 열기</span>
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="sm:hidden hidden" id="mobile-menu">
      <div class="pt-2 pb-3 space-y-1 bg-white border-b border-slate-200 shadow-lg">
        <a href="/" class="border-transparent text-slate-500 hover:bg-slate-50 hover:border-slate-300 hover:text-slate-900 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">메인 페이지</a>
        <a href="/register" class="border-transparent text-slate-500 hover:bg-slate-50 hover:border-slate-300 hover:text-slate-900 block pl-3 pr-4 py-2 border-l-4 text-base font-medium">등록하기</a>
        <a href="/vm" class="bg-indigo-50 border-indigo-500 text-indigo-700 block pl-3 pr-4 py-2 border-l-4 text-base font-bold">VM 접속하기</a>
      </div>
    </div>
  </nav>

  <main class="flex-grow flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 p-8">
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-indigo-100 text-indigo-600 mb-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h-8a2 2 0 01-2-2v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-900">VM 접속하기</h2>
        <p class="text-sm text-slate-500 mt-2">발급받으신 API 키를 입력하여 환경에 접속하세요.</p>
      </div>

      <form th:action="@{/vm/login}" method="post" class="space-y-6">
        <div>
          <label for="token" class="block text-sm font-semibold text-slate-700 mb-2">API 키</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <input type="text" class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors" id="token" name="token" placeholder="API 키를 입력하세요" required>
          </div>
        </div>
        
        <div>
          <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
            안전하게 접속하기
          </button>
        </div>
      </form>
      
    </div>
  </main>

  <footer class="bg-slate-900 mt-auto">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm text-slate-400">
        &copy; 2026 KPSC DLPC by <a href="https://github.com/Sharon77770" target="_blank" class="text-slate-300 hover:text-white transition-colors">GitHub Sharon77770</a>. All rights reserved.
      </p>
    </div>
  </footer>

  <script>
    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');

    btn.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  </script>
</body>
</html>
